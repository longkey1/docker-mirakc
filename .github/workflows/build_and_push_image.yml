name: build_and_publish_image

on:
  push:
    branches:
      - master

jobs:
  build_and_publish_image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      IMAGE_NAME: mirakc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read mirakc version
        run: echo "MIRAKC_VERSION=$(cat .mirakc-version | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Read recisdb-rs version
        run: echo "RECISDB_RS_VERSION=$(cat .recisdb-rs-version | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Read miraview version
        run: echo "MIRAVIEW_VERSION=$(cat .miraview-version | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.MIRAKC_VERSION }}
          build-args: |
            MIRAKC_VERSION=${{ env.MIRAKC_VERSION }}
            RECISDB_RS_VERSION=${{ env.RECISDB_RS_VERSION }}
            MIRAVIEW_VERSION=${{ env.MIRAVIEW_VERSION }}
